parse_version: "1.0"
schema_version: "1.0"

paths:
  project_root: "."
  data_root: "data/京剧剧本"
  pdf_cache: "artifacts/cache/pdf"
  output_cleaned: "artifacts/cleaned"
  collections_config: "configs/collections.yaml"

# 留空则处理 zip 内全部；开发阶段可只跑金样例
script_ids: []
# script_ids:
#   - "01001012"

# 批处理时限制每个 zip 的剧本数（0 = 不限制）
limit_per_zip: 0

# 默认处理的 zip（留空表示 data_root 下全部 *.zip）
zip_files: []
# zip_files:
#   - "01000000.zip"

# 并行：0=自动（min(CPU, 8)），1=串行；CPU 密集型任务使用多进程
parallel:
  workers: 0

analytics:
  num_topics: 8
  rhythm_window: 20
  # 主题分析：true 且设置 OPENAI_API_KEY 时走大模型（见 backend/analytics/theme/llm.py）
  theme_use_llm: false
  llm:
    model: gpt-4o-mini
    base_url: https://api.openai.com/v1
    num_topics: 6
    max_sample_chars: 12000
    max_blocks: 120
    timeout_sec: 120
